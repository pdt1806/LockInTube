<!doctype html>
<meta charset="UTF-8" />
<html>
  <head>
    <title>LockInTube</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img src="img/icon.png" />
      <h1>LockInTube</h1>
      <h3>Clear all distractions from YouTube for people who need to lock in.</h3>
      <!-- like lock tf in people -->
    </header>
    <hr />
    <section id="checklist">
      <div class="check-item">
        <input type="checkbox" id="lockintube-hide-recommendations" />
        <label for="lockintube-hide-recommendations">Hide recommendations</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="lockintube-hide-shorts" />
        <label for="lockintube-hide-shorts">Hide Shorts</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="lockintube-normalize-shorts" />
        <label for="lockintube-normalize-shorts">Play Shorts as normal videos</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="lockintube-hide-comments" />
        <label for="lockintube-hide-comments">Hide comments</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="lockintube-hide-sidebar" />
        <label for="lockintube-hide-sidebar">Hide sidebar videos</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="lockintube-hide-end-screen" />
        <label for="lockintube-hide-end-screen">Hide end screen videos</label>
      </div>
      <div class="check-item">
        <input type="checkbox" id="lockintube-hide-talk-to-recs" />
        <label for="lockintube-hide-talk-to-recs">Hide Talk to AI</label>
      </div>
      <!-- <p>Reload YouTube to apply new filters.</p> -->
    </section>
    <hr />
    <a href="navbar_settings.html" style="text-align: center"><p>Customize left navigation bar</p></a>
    <hr />
    <footer>
      <p>
        Made by
        <a href="https://bennynguyen.dev" target="_blank">Benny Nguyen</a>
      </p>
      <p>v1.0.0</p>
    </footer>
  </body>
  <script src="popup.js"></script>
</html>
